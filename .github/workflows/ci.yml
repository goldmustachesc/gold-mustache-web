name: CI

on:
  push:
    branches:
      - main
      - staging
  pull_request:
    branches:
      - main
      - staging

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/gold_mustache?schema=public
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/gold_mustache?schema=public
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-anon-key
      SUPABASE_SERVICE_ROLE_KEY: ci-service-role-key
      NEXT_PUBLIC_SITE_URL: https://goldmustache.example
      NEXT_PUBLIC_ENVIRONMENT: staging
      CRON_SECRET: ci-cron-secret
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run quality gate
        run: pnpm test:gate

      - name: Build application
        run: pnpm build

  security:
    name: Security (Snyk)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Snyk dependency scan
        if: env.SNYK_TOKEN != ''
        run: pnpm snyk:test

      - name: Skip Snyk dependency scan when token is missing
        if: env.SNYK_TOKEN == ''
        run: echo "Skipping Snyk scan because SNYK_TOKEN is not configured."
